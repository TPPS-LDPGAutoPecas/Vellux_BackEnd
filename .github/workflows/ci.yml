name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Test & Audit (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Vulnerabilities (Audit)
        run: npm audit --audit-level=high
        continue-on-error: true # Evita falhar o pipeline inteiro só por dependências antigas

      - name: Run Unit Tests with Coverage
        run: npx jest --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Garante o upload mesmo se um teste falhar
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7
